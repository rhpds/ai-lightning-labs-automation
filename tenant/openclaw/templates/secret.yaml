apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-oauth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  cookie-secret: {{ include "openclaw.oauthCookieSecret" . | b64enc | quote }}
  gateway-token: {{ include "openclaw.gatewayToken" . | b64enc | quote }}
