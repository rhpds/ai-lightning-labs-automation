apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ include "openclaw.fullname" . }}-tls
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.oauthProxy.port }}
      targetPort: {{ .Values.oauthProxy.port }}
      protocol: TCP
      name: https
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
