apiVersion: v1
kind: Service
metadata:
  name: multimodal-chatbot
  labels:
    app: multimodal-chatbot
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  selector:
    app: multimodal-chatbot
