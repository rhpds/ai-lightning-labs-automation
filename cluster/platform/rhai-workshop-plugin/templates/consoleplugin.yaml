apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: rhai-workshop-plugin
spec:
  displayName: RHAI Workshop Plugin
  backend:
    type: Service
    service:
      basePath: /
      name: rhai-workshop-plugin
      namespace: {{ .Values.namespace }}
      port: 9443
  proxy:
    - alias: backend
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: rhai-workshop-plugin
          namespace: {{ .Values.namespace }}
          port: 9443
