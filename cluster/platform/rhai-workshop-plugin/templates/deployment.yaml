apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rhai-workshop-plugin
    app.kubernetes.io/component: rhai-workshop-plugin
    app.kubernetes.io/instance: rhai-workshop-plugin
    app.kubernetes.io/part-of: rhai-workshop-plugin
    app.openshift.io/runtime-namespace: {{ .Values.namespace }}
  name: rhai-workshop-plugin
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhai-workshop-plugin
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rhai-workshop-plugin
    spec:
      serviceAccountName: rhai-workshop-plugin
      initContainers:
        - name: config-init
          image: {{ .Values.initImage }}
          command:
            - /bin/sh
            - -c
            - |
              # Enable the console plugin if not already enabled
              PLUGIN=rhai-workshop-plugin
              if kubectl get consoles.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
                echo "Plugin $PLUGIN already enabled"
              else
                kubectl patch consoles.operator.openshift.io cluster --type=json \
                  -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
                echo "Plugin $PLUGIN enabled"
              fi

              # Generate config.json
              echo "Discovering OpenShift AI URL from consolelink/rhodslink..."
              OPENSHIFT_AI_URL=""
              for i in 1 2 3; do
                  OPENSHIFT_AI_URL=$(oc get consolelink rhodslink -o jsonpath='{.spec.href}' 2>&1) && break
                  echo "Attempt $i failed: $OPENSHIFT_AI_URL"
                  OPENSHIFT_AI_URL=""
                  sleep 5
              done
              if [ -z "$OPENSHIFT_AI_URL" ]; then
                  echo "WARNING: Could not discover openshiftAiUrl. Available consolelinks:"
                  oc get consolelinks --no-headers 2>&1 || true
              else
                  echo "Discovered openshiftAiUrl: $OPENSHIFT_AI_URL"
              fi
              TUTORIAL_URLS=$(cat /config/tutorialUrls)
              SHOW_TABS=$(cat /config/showTabs 2>/dev/null || echo "true")
              cat > /config-out/config.json <<EOF
              {
                  "openshiftAiUrl": "${OPENSHIFT_AI_URL}",
                  "tutorialUrls": ${TUTORIAL_URLS},
                  "showTabs": ${SHOW_TABS}
              }
              EOF
          volumeMounts:
            - mountPath: /config
              name: workshop-config
              readOnly: true
            - mountPath: /config-out
              name: generated-config
      containers:
        - image: {{ .Values.image }}
          imagePullPolicy: Always
          name: rhai-workshop-plugin
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - mountPath: /var/serving-cert
              name: plugin-serving-cert
              readOnly: true
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-conf
              readOnly: true
              subPath: nginx.conf
            - mountPath: /usr/share/nginx/html/config.json
              name: generated-config
              readOnly: true
              subPath: config.json
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
        - name: plugin-serving-cert
          secret:
            defaultMode: 420
            secretName: plugin-serving-cert
        - name: nginx-conf
          configMap:
            defaultMode: 420
            name: nginx-conf
        - name: workshop-config
          configMap:
            defaultMode: 420
            name: workshop-config
        - name: generated-config
          emptyDir: {}
