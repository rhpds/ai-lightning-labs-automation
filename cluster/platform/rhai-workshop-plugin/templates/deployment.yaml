apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rhai-workshop-plugin
    app.kubernetes.io/component: rhai-workshop-plugin
    app.kubernetes.io/instance: rhai-workshop-plugin
    app.kubernetes.io/part-of: rhai-workshop-plugin
    app.openshift.io/runtime-namespace: {{ .Values.namespace }}
  name: rhai-workshop-plugin
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhai-workshop-plugin
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: rhai-workshop-plugin
    spec:
      serviceAccountName: rhai-workshop-plugin
      initContainers:
        - name: cluster-setup
          image: {{ .Values.initImage }}
          command:
            - /bin/sh
            - -c
            - |
              # Enable the console plugin if not already enabled
              PLUGIN=rhai-workshop-plugin
              if kubectl get consoles.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
                echo "Plugin $PLUGIN already enabled"
              else
                kubectl patch consoles.operator.openshift.io cluster --type=json \
                  -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
                echo "Plugin $PLUGIN enabled"
              fi

              # Patch IngressController to allow iframe embedding
              echo "Patching IngressController to remove X-Frame-Options and Content-Security-Policy"
              kubectl patch ingresscontroller/default -n openshift-ingress-operator --type=merge -p "{
                \"spec\": {
                  \"httpHeaders\": {
                    \"actions\": {
                      \"response\": [
                        {
                          \"name\": \"X-Frame-Options\",
                          \"action\": { \"type\": \"Delete\" }
                        },
                        {
                          \"name\": \"Content-Security-Policy\",
                          \"action\": { \"type\": \"Delete\" }
                        }
                      ]
                    }
                  }
                }
              }"
      containers:
        - image: {{ .Values.image }}
          imagePullPolicy: Always
          name: rhai-workshop-plugin
          ports:
            - containerPort: 9443
              protocol: TCP
          env:
            - name: PORT
              value: "9443"
            - name: PLUGIN_DIST_DIR
              value: /app/dist
            - name: TLS_CERT_FILE
              value: /var/serving-cert/tls.crt
            - name: TLS_KEY_FILE
              value: /var/serving-cert/tls.key
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /var/serving-cert
              name: plugin-serving-cert
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
        - name: plugin-serving-cert
          secret:
            defaultMode: 420
            secretName: plugin-serving-cert
