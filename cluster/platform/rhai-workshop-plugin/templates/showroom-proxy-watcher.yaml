---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: showroom-proxy-watcher
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: showroom-proxy-watcher
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: showroom-proxy-watcher
subjects:
- kind: ServiceAccount
  name: showroom-proxy-watcher
  namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: showroom-proxy-watcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: showroom-proxy-watcher
    app.kubernetes.io/component: showroom-proxy-watcher
    app.kubernetes.io/part-of: rhai-workshop-plugin
  name: showroom-proxy-watcher
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: showroom-proxy-watcher
  template:
    metadata:
      labels:
        app: showroom-proxy-watcher
    spec:
      serviceAccountName: showroom-proxy-watcher
      containers:
      - name: showroom-proxy-watcher
        image: {{ .Values.showroomWatcher.image }}
        imagePullPolicy: Always
        args:
        - --plugin-namespace={{ .Values.namespace }}
        - --plugin-deployment=rhai-workshop-plugin
        - --reconcile-frequency={{ .Values.showroomWatcher.reconcileFrequency }}
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
